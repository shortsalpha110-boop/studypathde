<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — StudyPathDE</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0D0D0D">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      background: #0D0D0D;
      color: #E8E8E8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.25;
      pointer-events: none;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(201,168,76,0.5), transparent 70%);
      top: -150px; left: -100px;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(99,102,241,0.4), transparent 70%);
      bottom: -100px; right: -80px;
    }
    .card {
      position: relative; z-index: 1;
      background: #1A1A1A;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 24px;
      padding: 64px 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 80px rgba(201,168,76,0.08);
    }
    .error-code {
      font-family: 'Inter', sans-serif;
      font-size: 7rem;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #f0c966, #C9A84C, #a8832e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    .title {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .subtitle {
      color: #888;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #C9A84C, #a8832e);
      color: #0D0D0D;
      padding: 14px 32px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 24px rgba(201,168,76,0.3);
    }
    .btn:hover { opacity: 0.88; transform: translateY(-2px); }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #E8E8E8;
      font-size: 1rem;
      font-weight: 700;
      margin-top: 32px;
    }
    .logo-icon { color: #C9A84C; }
    @media (max-width: 480px) {
      .card { padding: 40px 24px; }
      .error-code { font-size: 5rem; }
      .title { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="card">
    <div class="error-code">404</div>
    <h1 class="title">Page Not Found</h1>
    <p class="subtitle">
      The page you're looking for doesn't exist or has been moved.<br>
      Let's get you back on track.
    </p>
    <a href="https://studypathde.com" class="btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Back to StudyPathDE
    </a>
    <br>
    <a href="https://studypathde.com" class="logo">
      <span class="logo-icon">✦</span>
      <span>StudyPathDE</span>
    </a>
  </div>
</body>
</html>
